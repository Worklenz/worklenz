name: Bug Report
description: Report a defect found by QA or users
title: "[BUG] "
labels: ["Bug"]
body:

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: checkboxes
    id: environment
    attributes:
      label: Environment
      options:
        - label: UAT
        - label: Production
        - label: Mobile App

  - type: textarea
    id: evidence
    attributes:
      label: Evidence (Optional)
      description: Screenshots, logs, or videos if available
